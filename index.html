<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>FLV 播放器 - 可切换地址</title>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            flex: 1;
            position: relative;
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #msg {
            display: none;
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            padding: 16px;
            color: #fecaca;
            font: 14px/1.5 system-ui, sans-serif;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10;
        }

        #msg.show {
            display: flex;
        }

        .controls {
            background: #1a1a2e;
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #333;
        }

        .url-input {
            flex: 3;
            min-width: 200px;
            padding: 10px 12px;
            background: #0f0f1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
        }

        .url-input:focus {
            outline: none;
            border-color: #0078ff;
        }

        button {
            padding: 10px 20px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        button:hover {
            background: #005fcc;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        .preset-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 2;
        }

        .preset-btns button {
            background: #2c2c3e;
            font-size: 12px;
            padding: 8px 12px;
        }

        .preset-btns button:hover {
            background: #3c3c52;
        }

        .status {
            font-size: 12px;
            color: #888;
            margin-left: auto;
            padding: 0 8px;
        }

        .status.loading {
            color: #ffaa00;
        }

        .status.playing {
            color: #00ff88;
        }

        .status.error {
            color: #ff4444;
        }

        @media (max-width: 700px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .preset-btns {
                order: 2;
            }

            button {
                order: 3;
            }

            .status {
                order: 1;
                text-align: center;
                margin-left: 0;
                margin-bottom: 5px;
            }

            .url-input {
                order: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrapper">
            <div id="msg"></div>
            <video id="video" controls playsinline webkit-playsinline></video>
        </div>
        <div class="controls">
            <input type="text" id="urlInput" class="url-input" placeholder="输入 FLV 播放地址..." />
            <div class="preset-btns">
                <button data-url="https://sf1-cdn-tos.huoshanstatic.com/obj/media-fe/xgplayer_doc_video/flv/xgplayer-demo-720p.flv">📺 官方测试</button>
                <button data-url="http://pull-flv-f1.douyincdn.com/stream/720p.flv">🎬 斗云测试</button>
                <button data-url="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">⚠️ 无效(演示)</button>
            </div>
            <button id="switchBtn">🔁 切换播放</button>
            <span id="status" class="status">⚫ 未播放</span>
        </div>
    </div>

    <script>
        (function () {
            // ============================================================
            // 写死的默认播放地址（可自行修改）
            // ============================================================
            const DEFAULT_URL = 'https://sf1-cdn-tos.huoshanstatic.com/obj/media-fe/xgplayer_doc_video/flv/xgplayer-demo-720p.flv';

            let currentPlayer = null;
            let isPlaying = false;

            const video = document.getElementById('video');
            const msgDiv = document.getElementById('msg');
            const urlInput = document.getElementById('urlInput');
            const switchBtn = document.getElementById('switchBtn');
            const statusSpan = document.getElementById('status');

            // 显示错误/信息
            function showMessage(text, isError = true) {
                msgDiv.textContent = text;
                msgDiv.classList.add('show');
                if (isError) {
                    statusSpan.textContent = '❌ ' + text.substring(0, 40);
                    statusSpan.className = 'status error';
                } else {
                    statusSpan.textContent = '📢 ' + text.substring(0, 40);
                    statusSpan.className = 'status';
                }
                // 3秒后自动隐藏非错误消息
                if (!isError) {
                    setTimeout(() => {
                        if (msgDiv.textContent === text) {
                            msgDiv.classList.remove('show');
                        }
                    }, 3000);
                }
            }

            function hideMessage() {
                msgDiv.classList.remove('show');
            }

            function updateStatus(text, type = 'normal') {
                statusSpan.textContent = text;
                if (type === 'loading') {
                    statusSpan.className = 'status loading';
                } else if (type === 'playing') {
                    statusSpan.className = 'status playing';
                } else if (type === 'error') {
                    statusSpan.className = 'status error';
                } else {
                    statusSpan.className = 'status';
                }
            }

            // 销毁当前播放器
            function destroyPlayer() {
                if (currentPlayer) {
                    try {
                        currentPlayer.pause();
                        currentPlayer.unload();
                        currentPlayer.detachMediaElement();
                        currentPlayer.destroy();
                    } catch (e) {
                        console.warn('销毁播放器出错:', e);
                    }
                    currentPlayer = null;
                }
                // 不重置 video 的 src，避免闪烁
                isPlaying = false;
            }

            // 核心播放函数
            function playFlv(url) {
                if (!url || url.trim() === '') {
                    showMessage('请输入播放地址', true);
                    return false;
                }

                // 清理旧播放器
                destroyPlayer();

                // 重置视频元素
                video.pause();
                // 清空可能的旧流
                video.removeAttribute('src');
                video.load();

                hideMessage();
                updateStatus('加载中...', 'loading');

                // 检查 flv.js
                if (typeof flvjs === 'undefined') {
                    showMessage('flv.js 未加载，请检查网络', true);
                    updateStatus('flv.js 未加载', 'error');
                    return false;
                }

                if (!flvjs.isSupported()) {
                    showMessage('当前浏览器不支持 flv.js（需要 MSE 支持）', true);
                    updateStatus('浏览器不支持', 'error');
                    return false;
                }

                // 判断是否为直播流（简单规则，可根据需要修改）
                let isLive = url.toLowerCase().includes('live') || url.toLowerCase().includes('stream');
                
                try {
                    // 创建新播放器
                    currentPlayer = flvjs.createPlayer(
                        {
                            type: 'flv',
                            url: url.trim(),
                            isLive: isLive,
                        },
                        {
                            enableWorker: true,        // 开启多线程
                            enableStashBuffer: false,   // 低延迟
                            stashInitialSize: 128,
                        }
                    );

                    currentPlayer.attachMediaElement(video);
                    currentPlayer.load();

                    // 错误事件
                    currentPlayer.on(flvjs.Events.ERROR, function (type, detail) {
                        let errMsg = '播放错误';
                        if (detail && detail.code) {
                            if (detail.code === 1) errMsg = '网络错误，请检查地址或网络';
                            else if (detail.code === 2) errMsg = '格式错误，不是有效的 FLV';
                            else errMsg = `错误码: ${detail.code}`;
                        }
                        if (detail && detail.msg) errMsg += ` - ${detail.msg}`;
                        showMessage(errMsg, true);
                        updateStatus('播放失败', 'error');
                        console.error('flv error:', type, detail);
                        isPlaying = false;
                    });

                    // 加载完成（点播文件）
                    currentPlayer.on(flvjs.Events.LOADING_COMPLETE, function () {
                        console.log('播放结束');
                        if (!isLive) {
                            updateStatus('播放结束', 'normal');
                            isPlaying = false;
                        }
                    });

                    // 开始播放后
                    currentPlayer.on(flvjs.Events.PLAYING, function () {
                        hideMessage();
                        updateStatus('▶ 播放中', 'playing');
                        isPlaying = true;
                    });

                    currentPlayer.on(flvjs.Events.PAUSE, function () {
                        if (isPlaying) {
                            updateStatus('⏸ 已暂停', 'normal');
                        }
                    });

                    currentPlayer.on(flvjs.Events.STATISTICS_INFO, function (stat) {
                        if (stat && stat.speed && isPlaying) {
                            // 可选：显示实时速度，为了简洁暂时不覆盖状态
                            // statusSpan.innerHTML = `🎬 播放中 ${(stat.speed/1024).toFixed(0)} KB/s`;
                        }
                    });

                    // 自动播放
                    const playPromise = video.play();
                    if (playPromise && playPromise.catch) {
                        playPromise.catch((e) => {
                            console.warn('自动播放失败:', e);
                            showMessage('自动播放被浏览器阻止，请点击视频区域播放', false);
                            updateStatus('点击视频播放', 'normal');
                            
                            // 用户点击视频时恢复播放
                            const onClickPlay = function () {
                                video.play().then(() => {
                                    hideMessage();
                                    updateStatus('▶ 播放中', 'playing');
                                }).catch(() => {});
                                video.removeEventListener('click', onClickPlay);
                            };
                            video.addEventListener('click', onClickPlay, { once: true });
                        });
                    }

                    return true;
                } catch (e) {
                    console.error('创建播放器异常:', e);
                    showMessage('播放器初始化失败: ' + e.message, true);
                    updateStatus('初始化失败', 'error');
                    return false;
                }
            }

            // 切换播放（由按钮触发）
            function switchPlay() {
                let newUrl = urlInput.value.trim();
                if (!newUrl) {
                    showMessage('请先输入或选择播放地址', true);
                    return;
                }
                playFlv(newUrl);
            }

            // 初始化页面
            function init() {
                // 设置默认地址（写死的）
                urlInput.value = DEFAULT_URL;
                
                // 绑定切换按钮
                switchBtn.addEventListener('click', switchPlay);
                
                // 绑定预设按钮
                document.querySelectorAll('.preset-btns button').forEach(btn => {
                    btn.addEventListener('click', function () {
                        const presetUrl = this.getAttribute('data-url');
                        if (presetUrl) {
                            urlInput.value = presetUrl;
                            playFlv(presetUrl);
                        }
                    });
                });
                
                // 回车键切换
                urlInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        switchPlay();
                    }
                });
                
                // 自动播放写死的默认地址
                console.log('自动播放默认地址:', DEFAULT_URL);
                playFlv(DEFAULT_URL);
            }

            // 页面关闭时清理资源
            window.addEventListener('beforeunload', function () {
                if (currentPlayer) {
                    currentPlayer.destroy();
                }
            });

            // 启动
            init();
        })();
    </script>
</body>
</html>
