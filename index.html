<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>监控实时预览</title>
    <style>
        /* 基础样式复位 */
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000; /* 背景全黑，更像监控界面 */
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 顶部标题栏 */
        .header {
            padding: 15px;
            text-align: center;
            background: #1a1a1a;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        /* 视频容器：自适应宽度 */
        .video-container {
            width: 100%;
            position: relative;
            background: #000;
            /* 保持16:9比例的关键 */
            aspect-ratio: 16 / 9; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video-player {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 确保视频比例不变形 */
        }

        /* 状态显示区 */
        .status-info {
            padding: 12px;
            font-size: 12px;
            color: #00ff00;
            background: #0a0a0a;
            font-family: monospace;
            border-bottom: 1px solid #222;
        }

        /* 底部控制区 */
        .controls {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-content: flex-start;
            background: #121212;
        }

        button {
            flex: 1;
            min-width: 100px;
            max-width: 150px;
            height: 44px; /* 移动端手指点击的最佳高度 */
            border: none;
            border-radius: 6px;
            background: #333;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:active { background: #555; }
        .btn-play { background: #07c160; } /* 微信绿 */
        .btn-refresh { background: #666; }

        /* 针对超小屏幕优化 */
        @media (max-height: 500px) {
            .header { padding: 5px; font-size: 14px; }
            .controls { padding: 10px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
</head>
<body>

    <div class="header">车载监控实时画面</div>

    <div class="video-container">
        <video 
            id="video-player" 
            muted 
            autoplay 
            preload="auto"
            webkit-playsinline="true" 
            playsinline="true"
            x5-video-player-type="h5-page">
        </video>
    </div>

    <div class="status-info" id="log-box">正在连接视频流...</div>

    <div class="controls">
        <button class="btn-play" onclick="manualPlay()">点击播放</button>
        <button onclick="toggleMute()" id="mute-text">开启声音</button>
        <button class="btn-refresh" onclick="location.reload()">刷新</button>
    </div>

<script>
    var videoElement = document.getElementById('video-player');
    var logBox = document.getElementById('log-box');
    var flvPlayer = null;
    var streamUrl = "https://video1.gps51.com:82/live/18270773737_4_0_10782_video.flv";

    function log(msg) {
        logBox.innerText = "状态: " + msg;
    }

    function initPlayer(url) {
        if (!flvjs.isSupported()) {
            log("当前环境不支持FLV播放");
            return;
        }

        flvPlayer = flvjs.createPlayer({
            type: 'flv',
            url: url,
            isLive: true,
            cors: true
        }, {
            enableStashBuffer: false, // 极致低延迟
            autoCleanupSourceBuffer: true // 自动清理缓存
        });

        flvPlayer.attachMediaElement(videoElement);
        flvPlayer.load();

        // 自动播放尝试
        var playPromise = flvPlayer.play();
        if (playPromise !== undefined) {
            playPromise.then(() => log("已进入实时监控")).catch(e => log("请点击下方按钮播放"));
        }
    }

    function manualPlay() {
        if (flvPlayer) {
            flvPlayer.play();
            log("手动播放中...");
        }
    }

    function toggleMute() {
        videoElement.muted = !videoElement.muted;
        document.getElementById('mute-text').innerText = videoElement.muted ? "开启声音" : "已开启声音";
    }

    // 微信/小程序环境自动启动
    document.addEventListener("WeixinJSBridgeReady", function () {
        if (flvPlayer) flvPlayer.play();
    }, false);

    window.onload = function() {
        initPlayer(streamUrl);
    };

    // 异常自动重连
    flvPlayer.on(flvjs.Events.ERROR, (err) => {
        log("连接中断，重连中...");
        setTimeout(() => flvPlayer.reload(), 2000);
    });
</script>
</body>
</html>
